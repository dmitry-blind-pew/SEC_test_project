services:
  app:
    build: .
    container_name: sec_test_app
    ports:
      - "8000:8000"
    environment:
      MODE: "DEV"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASS: "1234"
      DB_NAME: "sectest"
      API_KEY: "dev-api-key"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
    depends_on:
      - db
      - redis

  db:
    image: postgis/postgis:16-3.4
    container_name: sec_test_db
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: "sectest"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  db_test:
    image: postgis/postgis:16-3.4
    container_name: sec_test_db_test
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: "sectest_test"
    ports:
      - "5433:5432"
    volumes:
      - pg_test_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sec_test_redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
  pg_test_data:
